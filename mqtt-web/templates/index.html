<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能晾衣架控制面板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='lib/chart.min.js') }}"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* 登录界面样式 */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .login-box {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-header {
            margin-bottom: 30px;
        }

        .login-icon {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 20px;
        }

        .login-title {
            font-size: 2rem;
            color: #333;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .login-subtitle {
            color: #666;
            font-size: 1rem;
        }

        .login-form {
            margin-top: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .login-button:hover {
            transform: translateY(-2px);
        }

        .login-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #e74c3c;
            margin-top: 15px;
            padding: 10px;
            background: #fdf2f2;
            border-radius: 8px;
            border-left: 4px solid #e74c3c;
        }

        .success-message {
            color: #27ae60;
            margin-top: 15px;
            padding: 10px;
            background: #f2fdf2;
            border-radius: 8px;
            border-left: 4px solid #27ae60;
        }

        .login-footer {
            margin-top: 30px;
            color: #666;
            font-size: 0.9rem;
        }

        /* 用户信息栏 */
        .user-info {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .welcome-message {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .logout-button {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .logout-button:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 主要内容区域 */
        .main-content {
            display: none;
        }

        .main-content.active {
            display: block;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* 传感器卡片样式 */
        .sensor-card {
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .sensor-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .sensor-card::after {
            content: "点击查看历史";
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 0.8rem;
            color: #666;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sensor-card:hover::after {
            opacity: 1;
        }

        .sensor-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .sensor-card.temperature::before {
            background: linear-gradient(90deg, #ff6b6b, #ee5a24);
        }

        .sensor-card.humidity::before {
            background: linear-gradient(90deg, #4ecdc4, #44a08d);
        }

        .sensor-card.light::before {
            background: linear-gradient(90deg, #feca57, #ff9ff3);
        }

        .sensor-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: #2c3e50;
            margin: 10px 0;
        }

        .sensor-unit {
            font-size: 1.2rem;
            color: #7f8c8d;
            margin-left: 5px;
        }

        .sensor-status {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            display: inline-block;
            margin-top: 10px;
        }

        .status-normal {
            background: #d4edda;
            color: #155724;
        }

        .status-warning {
            background: #fff3cd;
            color: #856404;
        }

        .status-danger {
            background: #f8d7da;
            color: #721c24;
        }

        /* 控制区域 */
        .control-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .control-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .control-button {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .extend-button {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
        }

        .extend-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 205, 196, 0.4);
        }

        .retract-button {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
        }

        .retract-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .control-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 模式切换按钮样式 */
        .mode-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .mode-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .mode-button {
            padding: 12px 25px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 100px;
            background: white;
            color: #666;
        }

        .mode-button.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .mode-button:hover:not(.active) {
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-1px);
        }

        .mode-status {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
        }

        .mode-status.auto {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
        }

        .mode-status.manual {
            background: linear-gradient(135deg, #feca57, #ff9ff3);
            color: white;
        }

        /* 晾衣架可视化 */
        .clothesline-visual {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
        }

        .clothesline-svg {
            width: 100%;
            max-width: 400px;
            height: 200px;
            margin: 20px 0;
        }

        .clothesline-status {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 15px;
            padding: 10px 20px;
            border-radius: 25px;
            display: inline-block;
        }

        .status-extended {
            background: #e8f5e8;
            color: #388e3c;
        }

        .status-retracted {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        /* 系统信息 */
        .system-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .info-card h4 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .status-connected {
            background: #27ae60;
        }

        .status-disconnected {
            background: #e74c3c;
        }

        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .modal-title {
            font-size: 1.5rem;
            color: #333;
            font-weight: 600;
        }

        .close {
            color: #aaa;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            line-height: 1;
        }

        .close:hover {
            color: #000;
        }

        .chart-container {
            margin: 20px 0;
            height: 300px;
            position: relative;
            width: 100%;
        }

        .chart-container canvas {
            max-width: 100%;
            height: 100% !important;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .history-table th,
        .history-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .history-table th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #333;
        }

        .history-table tr:hover {
            background-color: #f5f5f5;
        }

        /* 提示框样式 */
        .loading-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 20px 30px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 500;
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff40;
            border-top: 2px solid #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .control-buttons {
                flex-direction: column;
                align-items: center;
            }

            .control-button {
                width: 100%;
                max-width: 200px;
            }

            .user-info {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .modal-content {
                margin: 10% auto;
                width: 95%;
                padding: 20px;
            }
        }

        /* 页脚 */
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.8);
            margin-top: 40px;
            padding: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- 加载动画 -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- 登录界面 -->
    <div id="loginContainer" class="login-container">
        <div class="login-box">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-tshirt"></i>
                </div>
                <h2 class="login-title">智能晾衣架</h2>
                <p class="login-subtitle">请登录以访问控制面板</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" required>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="login-button" id="loginButton">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </button>
                
                <div id="loginMessage"></div>
            </form>
            
            <div class="login-footer">
                <p>默认账户: admin/admin123</p>
            </div>
        </div>
    </div>

    <!-- 主要内容 -->
    <div id="mainContent" class="main-content">
        <div class="container">
            <!-- 用户信息栏 -->
            <div class="user-info">
                <div class="welcome-message">
                    <i class="fas fa-user"></i>
                    欢迎, <span id="currentUser">用户</span>
                </div>
                <button class="logout-button" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> 退出登录
                </button>
            </div>

            <!-- 页面标题 -->
            <div class="header">
                <h1><i class="fas fa-tshirt"></i> 智能晾衣架控制面板</h1>
                <p>实时监控环境数据，智能控制晾衣架</p>
            </div>

            <!-- MQTT连接状态 -->
            <div class="system-info">
                <div class="info-card">
                    <h4><i class="fas fa-wifi"></i> MQTT连接状态</h4>
                    <div class="connection-status" id="mqttStatus">
                        <div class="status-indicator status-disconnected"></div>
                        <span>连接中...</span>
                    </div>
                </div>
                <div class="info-card">
                    <h4><i class="fas fa-clock"></i> 最后更新</h4>
                    <div id="lastUpdate">等待数据...</div>
                </div>
            </div>

            <!-- 传感器数据 -->
            <div class="dashboard">
                <div class="card sensor-card temperature" onclick="showHistory('temperature')">
                    <h3><i class="fas fa-thermometer-half"></i> 温度</h3>
                    <div class="sensor-value" id="temperatureValue">--<span class="sensor-unit">°C</span></div>
                    <div class="sensor-status status-normal" id="temperatureStatus">正常</div>
                </div>

                <div class="card sensor-card humidity" onclick="showHistory('humidity')">
                    <h3><i class="fas fa-tint"></i> 湿度</h3>
                    <div class="sensor-value" id="humidityValue">--<span class="sensor-unit">%</span></div>
                    <div class="sensor-status status-normal" id="humidityStatus">正常</div>
                </div>

                <div class="card sensor-card light" onclick="showHistory('light')">
                    <h3><i class="fas fa-sun"></i> 光照强度</h3>
                    <div class="sensor-value" id="lightValue">--<span class="sensor-unit">lux</span></div>
                    <div class="sensor-status status-normal" id="lightStatus">正常</div>
                </div>
            </div>

            <!-- 晾衣架可视化 -->
            <div class="clothesline-visual">
                <h3><i class="fas fa-tshirt"></i> 晾衣架状态</h3>
                <svg class="clothesline-svg" viewBox="0 0 400 200">
                    <!-- 晾衣架结构 -->
                    <line x1="50" y1="50" x2="350" y2="50" stroke="#333" stroke-width="4"/>
                    <line x1="50" y1="50" x2="50" y2="150" stroke="#333" stroke-width="4"/>
                    <line x1="350" y1="50" x2="350" y2="150" stroke="#333" stroke-width="4"/>
                    
                    <!-- 可伸缩部分 -->
                    <g id="clotheslineArm">
                        <line x1="100" y1="80" x2="300" y2="80" stroke="#667eea" stroke-width="6"/>
                        <!-- 衣服 -->
                        <g id="clothes">
                            <rect x="140" y="85" width="30" height="40" fill="#ff6b6b" rx="5"/>
                            <rect x="180" y="85" width="30" height="40" fill="#4ecdc4" rx="5"/>
                            <rect x="220" y="85" width="30" height="40" fill="#feca57" rx="5"/>
                        </g>
                    </g>
                </svg>
                <div class="clothesline-status status-retracted" id="clotheslineStatus">已收回</div>
            </div>

            <!-- 模式切换区域 -->
            <div class="mode-section">
                <h3><i class="fas fa-cog"></i> 工作模式</h3>
                <div class="mode-buttons">
                    <button class="mode-button active" id="autoModeBtn" onclick="switchMode('auto')">
                        <i class="fas fa-magic"></i> 自动模式
                    </button>
                    <button class="mode-button" id="manualModeBtn" onclick="switchMode('manual')">
                        <i class="fas fa-hand-paper"></i> 手动模式
                    </button>
                </div>
                <div class="mode-status auto" id="modeStatus">当前模式：自动模式</div>
            </div>

            <!-- 控制区域 -->
            <div class="control-section">
                <h3><i class="fas fa-gamepad"></i> 晾衣架控制</h3>
                <div class="control-buttons">
                    <button class="control-button extend-button" onclick="controlClothesline('extend')">
                        <i class="fas fa-arrow-right"></i> 伸出
                    </button>
                    <button class="control-button retract-button" onclick="controlClothesline('retract')">
                        <i class="fas fa-arrow-left"></i> 收回
                    </button>
                </div>
            </div>

            <!-- 页脚 -->
            <div class="footer">
                <p>&copy; 2024 智能晾衣架控制系统 | 物联网技术应用</p>
            </div>
        </div>
    </div>

    <!-- 历史数据模态框 -->
    <div id="historyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modalTitle">历史数据</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="chart-container">
                <canvas id="historyChart"></canvas>
            </div>
            <table class="history-table" id="historyTable">
                <thead>
                    <tr>
                        <th>时间</th>
                        <th>数值</th>
                    </tr>
                </thead>
                <tbody id="historyTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 全局变量
        let socket;
        let currentUser = null;
        let sensorData = {
            temperature: null,
            humidity: null,
            light: null
        };
        let clotheslineStatus = 'retract';
        let workMode = 'auto'; // 工作模式：auto或manual
        let historyChart = null;

        // 显示加载提示框
        function showLoadingToast(message = '请等待...') {
            // 移除已存在的提示框
            const existingToast = document.querySelector('.loading-toast');
            if (existingToast) {
                existingToast.remove();
            }

            // 创建新的提示框
            const toast = document.createElement('div');
            toast.className = 'loading-toast';
            toast.innerHTML = `
                <div class="loading-spinner"></div>
                <span>${message}</span>
            `;
            
            document.body.appendChild(toast);
            return toast;
        }

        // 隐藏加载提示框
        function hideLoadingToast() {
            const toast = document.querySelector('.loading-toast');
            if (toast) {
                toast.remove();
            }
        }

        // 通用的fetch包装函数，处理401未授权错误
        async function safeFetch(url, options = {}) {
            try {
                const response = await fetch(url, options);
                
                // 如果收到401未授权响应，跳转到登录页面
                if (response.status === 401) {
                    console.log('会话已过期，需要重新登录');
                    currentUser = null;
                    if (socket) {
                        socket.disconnect();
                    }
                    showLoginInterface();
                    return null;
                }
                
                return response;
            } catch (error) {
                console.error('网络请求失败:', error);
                throw error;
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 检查Chart.js是否加载
            if (typeof Chart === 'undefined') {
                console.warn('Chart.js库尚未加载，等待加载完成...');
                // 等待Chart.js加载
                const checkChart = setInterval(() => {
                    if (typeof Chart !== 'undefined') {
                        console.log('Chart.js库加载完成');
                        clearInterval(checkChart);
                        initializePage();
                    }
                }, 50);
            } else {
                console.log('Chart.js库已加载');
                initializePage();
            }
        });
        
        // 初始化页面
        function initializePage() {
            checkLoginStatus();
            setupEventListeners();
        }

        // 检查登录状态
        async function checkLoginStatus() {
            try {
                const response = await fetch('/api/check-login');
                if (!response) return; // safeFetch返回null表示401错误已处理
                
                const result = await response.json();
                
                if (result.success && result.logged_in) {
                    currentUser = result.user;
                    showMainInterface();
                    initializeApp();
                } else {
                    showLoginInterface();
                }
            } catch (error) {
                console.error('检查登录状态失败:', error);
                showLoginInterface();
            }
        }

        // 设置事件监听器
        function setupEventListeners() {
            // 登录表单
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            
            // 页面可见性变化
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden && currentUser && socket && socket.connected) {
                    // socket.emit('request_data'); // 已禁用自动请求数据
                }
            });

            // 窗口焦点
            window.addEventListener('focus', function() {
                if (currentUser && socket && socket.connected) {
                    // socket.emit('request_data'); // 已禁用自动请求数据
                }
            });
        }

        // 处理登录
        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginButton = document.getElementById('loginButton');
            const messageDiv = document.getElementById('loginMessage');
            
            if (!username || !password) {
                showMessage('请输入用户名和密码', 'error');
                return;
            }
            
            loginButton.disabled = true;
            loginButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    currentUser = result.user || username;
                    showMessage('登录成功！', 'success');
                    
                    setTimeout(() => {
                        showMainInterface();
                        initializeApp();
                    }, 1000);
                } else {
                    showMessage(result.message || '登录失败', 'error');
                }
            } catch (error) {
                console.error('登录错误:', error);
                showMessage('网络错误，请重试', 'error');
            } finally {
                loginButton.disabled = false;
                loginButton.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登录';
            }
        }

        // 显示消息
        function showMessage(message, type) {
            const messageDiv = document.getElementById('loginMessage');
            messageDiv.className = type === 'error' ? 'error-message' : 'success-message';
            messageDiv.textContent = message;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        // 显示登录界面
        function showLoginInterface() {
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('mainContent').classList.remove('active');
        }

        // 显示主界面
        function showMainInterface() {
            document.getElementById('loginContainer').style.display = 'none';
            document.getElementById('mainContent').classList.add('active');
            document.getElementById('currentUser').textContent = currentUser;
        }

        // 退出登录
        async function logout() {
            try {
                await fetch('/api/logout', { method: 'POST' });
            } catch (error) {
                console.error('退出登录错误:', error);
            }
            
            currentUser = null;
            
            if (socket) {
                socket.disconnect();
            }
            
            showLoginInterface();
        }

        // 初始化应用
        async function initializeApp() {
            initializeWebSocket();
            
            // 通过WebSocket请求初始数据
            if (socket && socket.connected) {
                // socket.emit('request_data'); // 已禁用自动请求数据
            }
            
            // 获取配置并设置定期通过WebSocket请求数据
            try {
                const configResponse = await safeFetch('/api/config');
                if (!configResponse) return; // 401错误已处理
                const configResult = await configResponse.json();
                
                if (configResult.success && configResult.config) {
                    const requestInterval = configResult.config.frontend_request_interval * 1000; // 转换为毫秒
                    console.log(`📊 设置前端请求间隔: ${configResult.config.frontend_request_interval}秒`);
                    setInterval(() => {
                        if (socket && socket.connected) {
                            // socket.emit('request_data'); // 已禁用自动请求数据
                        }
                    }, requestInterval);
                } else {
                    // 使用默认间隔
                    setInterval(() => {
                        if (socket && socket.connected) {
                            // socket.emit('request_data'); // 已禁用自动请求数据
                        }
                    }, 30000);
                }
            } catch (error) {
                console.error('获取配置失败，使用默认间隔:', error);
                setInterval(() => {
                    if (socket && socket.connected) {
                        // socket.emit('request_data'); // 已禁用自动请求数据
                    }
                }, 30000); // 使用默认30秒间隔
            }
        }

        // 初始化WebSocket连接
        function initializeWebSocket() {
            socket = io();
            
            socket.on('connect', function() {
                console.log('WebSocket已连接');
                updateMQTTStatus(true);
                // 连接建立后立即请求数据
                // socket.emit('request_data'); // 已禁用自动请求数据
            });
            
            socket.on('disconnect', function() {
                console.log('WebSocket已断开');
                updateMQTTStatus(false);
            });
            
            socket.on('sensor_data', function(data) {
                updateSensorData(data);
            });
            
            socket.on('sensor_update', function(data) {
                // 处理单个传感器数据更新
                if (data.type && data.value !== undefined) {
                    const sensorData = {};
                    sensorData[data.type] = data.value;
                    updateSensorData(sensorData);
                }
            });
            
            socket.on('status_update', function(data) {
                updateClotheslineStatus(data.status);
            });
            
            socket.on('mqtt_status', function(data) {
                console.log('MQTT状态变化:', data.connected ? '已连接' : '已断开');
                updateMQTTStatus(data.connected);
                
                // 如果MQTT重连，显示提示信息
                if (data.connected) {
                    console.log('🔄 MQTT重连成功，状态已同步');
                }
            });
            
            socket.on('message', function(data) {
                console.log('收到消息:', data);
            });
        }

        // 更新MQTT连接状态
        function updateMQTTStatus(connected) {
            const statusElement = document.getElementById('mqttStatus');
            const indicator = statusElement.querySelector('.status-indicator');
            const text = statusElement.querySelector('span');
            
            if (connected) {
                indicator.className = 'status-indicator status-connected';
                text.textContent = '已连接';
            } else {
                indicator.className = 'status-indicator status-disconnected';
                text.textContent = '未连接';
            }
        }

        // 更新传感器数据
        function updateSensorData(data) {
            if (data.temperature !== undefined) {
                sensorData.temperature = data.temperature;
                document.getElementById('temperatureValue').innerHTML = 
                    `${data.temperature.toFixed(1)}<span class="sensor-unit">°C</span>`;
                updateSensorStatus('temperature', data.temperature);
            }
            
            if (data.humidity !== undefined) {
                sensorData.humidity = data.humidity;
                document.getElementById('humidityValue').innerHTML = 
                    `${data.humidity.toFixed(1)}<span class="sensor-unit">%</span>`;
                updateSensorStatus('humidity', data.humidity);
            }
            
            if (data.light !== undefined) {
                sensorData.light = data.light;
                document.getElementById('lightValue').innerHTML = 
                    `${Math.round(data.light)}<span class="sensor-unit">lux</span>`;
                updateSensorStatus('light', data.light);
            }
            
            // 处理晾衣架状态 - 显示实际状态
            if (data.clothesline_status !== undefined) {
                updateClotheslineStatus(data.clothesline_status);
            }
            
            // 处理工作模式状态
            if (data.work_mode !== undefined) {
                workMode = data.work_mode;
                updateModeDisplay(data.work_mode);
            }
            
            // 更新最后更新时间
            document.getElementById('lastUpdate').textContent = new Date().toLocaleString();
        }

        // 更新传感器状态
        function updateSensorStatus(type, value) {
            const statusElement = document.getElementById(type + 'Status');
            let status = 'normal';
            let text = '正常';
            
            switch (type) {
                case 'temperature':
                    if (value < 10 || value > 35) {
                        status = 'warning';
                        text = value < 10 ? '偏低' : '偏高';
                    }
                    break;
                case 'humidity':
                    if (value < 30 || value > 80) {
                        status = 'warning';
                        text = value < 30 ? '偏低' : '偏高';
                    }
                    break;
                case 'light':
                    if (value < 100) {
                        status = 'warning';
                        text = '偏暗';
                    } else if (value > 1000) {
                        status = 'warning';
                        text = '偏亮';
                    }
                    break;
            }
            
            statusElement.className = `sensor-status status-${status}`;
            statusElement.textContent = text;
        }

        // 更新晾衣架状态
        function updateClotheslineStatus(status) {
            clotheslineStatus = status;
            const statusElement = document.getElementById('clotheslineStatus');
            
            // 简化状态显示：只支持extend和retract
            switch (status) {
                case 'extend':
                    statusElement.textContent = '已伸出';
                    statusElement.className = 'clothesline-status status-extended';
                    break;
                case 'retract':
                    statusElement.textContent = '已收回';
                    statusElement.className = 'clothesline-status status-retracted';
                    break;
                default:
                    statusElement.textContent = '已收回';
                    statusElement.className = 'clothesline-status status-retracted';
                    break;
            }
            
            // 更新可视化
            updateClotheslineVisual(status);
        }

        // 更新晾衣架可视化
        function updateClotheslineVisual(status) {
            const arm = document.getElementById('clotheslineArm');
            const clothes = document.getElementById('clothes');
            
            // 简化可视化效果：只支持extend和retract
            switch (status) {
                case 'extend':
                    // 已伸出
                    arm.style.transform = 'translateX(0)';
                    arm.style.transition = 'transform 0.5s ease';
                    clothes.style.opacity = '1';
                    clothes.style.transition = 'opacity 0.5s ease';
                    break;
                case 'retract':
                default:
                    // 已收回
                    arm.style.transform = 'translateX(-50px)';
                    arm.style.transition = 'transform 0.5s ease';
                    clothes.style.opacity = '0.3';
                    clothes.style.transition = 'opacity 0.5s ease';
                    break;
            }
        }

        // 控制晾衣架
        async function controlClothesline(action) {
            // 检查当前模式，如果是自动模式则阻止手动操作
            if (workMode === 'auto') {
                alert('请切换至手动模式再操作');
                return;
            }
            
            // 显示提示框
            const actionText = action === 'extend' ? '伸出' : '收回';
            showLoadingToast(`正在${actionText}晾衣架，请等待...`);
            
            try {
                const response = await safeFetch('/api/control', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ action })
                });
                
                if (!response) {
                    hideLoadingToast();
                    return; // 401错误已处理
                }
                
                const result = await response.json();
                
                // 2秒后隐藏提示框
                setTimeout(() => {
                    hideLoadingToast();
                }, 2000);
                
                if (result.success) {
                    console.log('控制指令发送成功:', result.message);
                } else {
                    console.error('控制指令发送失败:', result.message);
                    // 如果失败，立即隐藏提示框并显示错误
                    hideLoadingToast();
                    alert('控制失败: ' + result.message);
                }
            } catch (error) {
                console.error('控制错误:', error);
                hideLoadingToast();
                alert('网络错误，请重试');
            }
        }

        // 切换工作模式
        async function switchMode(mode) {
            // 显示提示框
            const modeText = mode === 'auto' ? '自动模式' : '手动模式';
            showLoadingToast(`正在切换到${modeText}，请等待...`);
            
            try {
                const response = await safeFetch('/api/control', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ action: `mode_${mode}` })
                });
                
                if (!response) {
                    hideLoadingToast();
                    return; // 401错误已处理
                }
                
                const result = await response.json();
                
                // 2秒后隐藏提示框
                setTimeout(() => {
                    hideLoadingToast();
                }, 2000);
                
                if (result.success) {
                    console.log('模式切换成功:', result.message);
                    // 更新本地状态
                    workMode = mode;
                    updateModeDisplay(mode);
                } else {
                    console.error('模式切换失败:', result.message);
                    // 如果失败，立即隐藏提示框并显示错误
                    hideLoadingToast();
                    alert('模式切换失败: ' + result.message);
                }
            } catch (error) {
                console.error('模式切换错误:', error);
                hideLoadingToast();
                alert('网络错误，请重试');
            }
        }

        // 更新模式显示
        function updateModeDisplay(mode) {
            const autoBtn = document.getElementById('autoModeBtn');
            const manualBtn = document.getElementById('manualModeBtn');
            const modeStatus = document.getElementById('modeStatus');
            
            // 更新按钮状态
            if (mode === 'auto') {
                autoBtn.classList.add('active');
                manualBtn.classList.remove('active');
                modeStatus.textContent = '当前模式：自动模式';
                modeStatus.className = 'mode-status auto';
            } else {
                autoBtn.classList.remove('active');
                manualBtn.classList.add('active');
                modeStatus.textContent = '当前模式：手动模式';
                modeStatus.className = 'mode-status manual';
            }
        }

        // 请求当前数据
        async function requestCurrentData() {
            try {
                // 请求传感器数据
                const sensorResponse = await safeFetch('/api/sensor-data');
                if (sensorResponse) {
                    const sensorResult = await sensorResponse.json();
                    if (sensorResult.success && sensorResult.data) {
                        updateSensorData(sensorResult.data);
                    }
                }
                
                // 请求晾衣架状态
                const statusResponse = await safeFetch('/api/clothesline-status');
                if (statusResponse) {
                    const statusResult = await statusResponse.json();
                    if (statusResult.success) {
                        updateClotheslineStatus(statusResult.status);
                    }
                }
                
                // 通过API请求最新数据
                // const requestResponse = await safeFetch('/api/request-data', { method: 'POST' }); // 已禁用自动请求数据
                
            } catch (error) {
                console.error('请求数据错误:', error);
            }
        }

        // 显示历史数据
        async function showHistory(sensorType) {
            // 检查是否已登录
            if (!currentUser) {
                alert('请先登录');
                return;
            }
            
            try {
                console.log(`正在获取${sensorType}历史数据...`);
                const response = await safeFetch(`/api/history/${sensorType}`);
                
                if (!response) return; // 401错误已处理
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const result = await response.json();
                console.log('历史数据响应:', result);
                
                if (result.success) {
                    if (result.data && result.data.length > 0) {
                        displayHistoryModal(sensorType, result.data);
                    } else {
                        alert('暂无历史数据');
                    }
                } else {
                    alert('获取历史数据失败: ' + (result.message || '未知错误'));
                }
            } catch (error) {
                console.error('获取历史数据错误:', error);
                alert('网络错误，请重试: ' + error.message);
            }
        }

        // 显示历史数据模态框
        function displayHistoryModal(sensorType, data) {
            const modal = document.getElementById('historyModal');
            const title = document.getElementById('modalTitle');
            
            // 设置标题
            const sensorNames = {
                temperature: '温度',
                humidity: '湿度',
                light: '光照强度'
            };
            title.textContent = `${sensorNames[sensorType]}历史数据`;
            
            // 显示图表
            displayChart(sensorType, data);
            
            // 显示表格
            displayTable(data);
            
            // 显示模态框
            modal.style.display = 'block';
        }

        // 显示图表
        function displayChart(sensorType, data) {
            try {
                console.log('开始渲染图表:', sensorType, data);
                
                // 检查Chart.js是否已加载
                if (typeof Chart === 'undefined') {
                    console.error('Chart.js库未加载，等待加载完成...');
                    // 延迟重试
                    setTimeout(() => displayChart(sensorType, data), 100);
                    return;
                }
                
                const canvas = document.getElementById('historyChart');
                if (!canvas) {
                    console.error('找不到图表画布元素');
                    return;
                }
                
                const ctx = canvas.getContext('2d');
                
                // 销毁现有图表
                if (historyChart) {
                    historyChart.destroy();
                    historyChart = null;
                }
                
                if (!data || data.length === 0) {
                    console.warn('没有数据可显示');
                    return;
                }
                
                const labels = data.map(item => {
                    const date = new Date(item.timestamp);
                    return date.toLocaleTimeString();
                });
                
                const values = data.map(item => parseFloat(item.value));
                
                const colors = {
                    temperature: { bg: 'rgba(255, 107, 107, 0.2)', border: 'rgba(255, 107, 107, 1)' },
                    humidity: { bg: 'rgba(78, 205, 196, 0.2)', border: 'rgba(78, 205, 196, 1)' },
                    light: { bg: 'rgba(254, 202, 87, 0.2)', border: 'rgba(254, 202, 87, 1)' }
                };
                
                const units = {
                    temperature: '°C',
                    humidity: '%',
                    light: 'lux'
                };
                
                const sensorNames = {
                    temperature: '温度',
                    humidity: '湿度',
                    light: '光照强度'
                };
                
                console.log('图表数据:', { labels, values });
                
                historyChart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: `${sensorNames[sensorType]} (${units[sensorType]})`,
                            data: values,
                            backgroundColor: colors[sensorType].bg,
                            borderColor: colors[sensorType].border,
                            borderWidth: 2,
                            fill: true,
                            tension: 0.4,
                            pointBackgroundColor: colors[sensorType].border,
                            pointBorderColor: colors[sensorType].border,
                            pointRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            title: {
                                display: true,
                                text: `${sensorNames[sensorType]}历史趋势`
                            },
                            legend: {
                                display: true
                            }
                        },
                        scales: {
                            y: {
                                beginAtZero: false,
                                title: {
                                    display: true,
                                    text: units[sensorType]
                                }
                            },
                            x: {
                                title: {
                                    display: true,
                                    text: '时间'
                                }
                            }
                        }
                    }
                });
                
                console.log('图表创建成功');
            } catch (error) {
                console.error('创建图表时出错:', error);
            }
        }

        // 显示表格
        function displayTable(data) {
            const tbody = document.getElementById('historyTableBody');
            tbody.innerHTML = '';
            
            data.forEach(item => {
                const row = tbody.insertRow();
                row.insertCell(0).textContent = item.timestamp;
                row.insertCell(1).textContent = item.value.toFixed(1);
            });
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('historyModal').style.display = 'none';
            if (historyChart) {
                historyChart.destroy();
                historyChart = null;
            }
        }

        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('historyModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
